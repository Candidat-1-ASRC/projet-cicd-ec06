name: 01 - CI Build et Test

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    name: Build Docker et Test HTTP
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Construction de l image Docker
        run: docker build -t catal-log:ci-test .

      - name: Lancement du conteneur
        run: |
          docker run -d --name ci-test -p 8080:80 catal-log:ci-test
          sleep 5

      - name: Test HTTP
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080)
          echo "Code HTTP : $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then exit 1; fi
          echo "Test reussi"

      - name: Verification contenu HTML
        run: |
          CONTENT=$(curl -s http://localhost:8080)
          if echo "$CONTENT" | grep -q "Catal-Log"; then
            echo "Contenu HTML verifie"
          else
            echo "ERREUR contenu HTML inattendu"
            exit 1
          fi

      - name: Verification version.json
        run: |
          VERSION=$(curl -s http://localhost:8080/version.json)
          echo "Contenu version.json : $VERSION"
          if echo "$VERSION" | grep -q "EC06"; then
            echo "version.json valide"
          else
            echo "ERREUR version.json invalide"
            exit 1
          fi

      - name: Nettoyage
        if: always()
        run: |
          docker stop ci-test || true
          docker rm ci-test || true