<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catal-Log - EC06 CI/CD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f2044;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        .container {
            text-align: center;
            padding: 50px 40px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
            max-width: 700px;
            width: 90%;
        }
        .label {
            font-size: 13px;
            color: #a8b2d8;
            letter-spacing: 3px;
            margin-bottom: 10px;
        }
        h1 {
            font-size: 2.8em;
            font-weight: 700;
            color: #e94560;
            margin-bottom: 8px;
        }
        .subtitle {
            font-size: 14px;
            color: #a8b2d8;
            margin-bottom: 24px;
        }
        .badges {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 32px;
        }
        .badge {
            background: transparent;
            border: 1px solid #e94560;
            color: #e94560;
            padding: 5px 16px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: 600;
        }
        .pipeline {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 32px;
        }
        .step {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            padding: 14px 20px;
            font-size: 13px;
            color: #e2e8f0;
            min-width: 80px;
        }
        .step.active {
            background: rgba(233,69,96,0.25);
            border-color: #e94560;
        }
        .step .icon {
            font-size: 22px;
            margin-bottom: 6px;
        }
        .arrow {
            color: #e94560;
            font-size: 20px;
            font-weight: bold;
        }
        .footer {
            background: rgba(255,255,255,0.04);
            border-radius: 10px;
            padding: 16px;
            font-size: 13px;
            color: #8892b0;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="label">C a t a l - L o g</div>
        <h1>Pipeline CI/CD</h1>
        <div class="subtitle">Formation ASRC &mdash; EC06</div>
        <div class="badges">
            <span class="badge">GitHub Actions</span>
            <span class="badge">Docker</span>
            <span class="badge">GHCR</span>
            <span class="badge">Nginx</span>
        </div>

            <div class="arrow">→</div>
            <div class="step"><div class="icon">🧪</div>Test</div>
            <div class="arrow">→</div>
            <div class="step"><div class="icon">📤</div>Publish</div>
